<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VEYRA EMPIRE - Verifying access</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0612; color: #f5e9d0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .wrap { max-width: 360px; margin: 0 auto; padding: 28px 24px; text-align: center; }
    h1 { color: #e6965a; font-size: 19px; margin: 0 0 10px; line-height: 1.3; }
    p { margin: 8px 0; font-size: 14px; line-height: 1.5; }
    .muted { color: #a39580; font-size: 13px; }
    .btn { display: inline-block; background: #e6965a; color: #1a0d05; padding: 10px 18px; border-radius: 999px; text-decoration: none; font-weight: 600; font-size: 14px; border: 0; cursor: pointer; font-family: inherit; margin-top: 14px; }
    .btn:hover { background: #f2a868; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(230,150,90,0.25); border-top-color: #e6965a; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 8px 0 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<!--
  Popup window opened by the auth bootstrap on game pages. This page runs in
  FIRST-PARTY context on veyra-empire.github.io (not as a third-party iframe),
  so localStorage.veyra_fingerprint is readable. Reads the fingerprint,
  validates with the proxy via JSONP, postMessages the result back to
  window.opener, then closes itself.

  Flow:
    1. game page bootstrap calls window.open(verify.html?origin=X&nonce=N)
    2. this page validates it has the right query params
    3. reads veyra_fingerprint from localStorage
    4. JSONP call to proxy apiVerifyFingerprint
    5. on ok: postMessage({type:'veyra-verify', nonce, status:'ok', discordId, tier}, origin)
    6. closes window

  Status values:
    'ok'           - valid signed fingerprint, current tier included
    'null-session' - no fingerprint in localStorage, or proxy rejected sig
    'bad-origin'   - caller origin not in allowlist
    'bad-nonce'    - caller supplied no nonce
-->
<div class="wrap">
  <h1 id="heading">Verifying access&hellip;</h1>
  <div id="state"><div class="spinner"></div><p class="muted">Checking your VEYRA EMPIRE sign-in.</p></div>
</div>
<script>
(function() {
  'use strict';

  var PROXY_URL = 'https://script.google.com/macros/s/AKfycbzUHg1z18WmWFSyEsZStaK2kmax2JXnPzK4LrTyEitSFVBQ2u2vfFeO6wZhjWx58EJZ7w/exec';
  var ARCHIVE_URL = 'https://veyra-empire.github.io/scripts/';

  // Game hosts allowed to request identity. Matches the bootstrap's origin
  // check on the incoming postMessage target.
  var ORIGIN_ALLOWLIST = [
    'https://demonicscans.org',
    'http://demonicscans.org'
  ];

  function qp(name) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  }

  var targetOrigin = qp('origin');
  var nonce        = qp('nonce');

  function setHeading(txt) { document.getElementById('heading').textContent = txt; }
  function setBody(html)   { document.getElementById('state').innerHTML = html; }

  function reply(status, extras) {
    if (!window.opener || window.opener.closed) {
      setHeading('Done');
      setBody('<p class="muted">You can close this window now.</p>');
      return;
    }
    var payload = { type: 'veyra-verify', nonce: nonce, status: status };
    if (extras) {
      for (var k in extras) if (Object.prototype.hasOwnProperty.call(extras, k)) payload[k] = extras[k];
    }
    try { window.opener.postMessage(payload, targetOrigin); } catch (_) { /* opener unreachable */ }
    setTimeout(function() { try { window.close(); } catch (_) {} }, 300);
  }

  function showSignInNeeded() {
    setHeading('Sign in needed');
    setBody(
      '<p>You need to sign in to the <strong>VEYRA EMPIRE Archive</strong> first.</p>' +
      '<p><a class="btn" href="' + ARCHIVE_URL + '">Open archive to sign in</a></p>' +
      '<p class="muted">After you sign in there, close this window and click "Verify access" again on the game page.</p>'
    );
  }

  // Parameter validation.
  if (!nonce)         { reply('bad-nonce');  return; }
  if (!targetOrigin || ORIGIN_ALLOWLIST.indexOf(targetOrigin) < 0) { reply('bad-origin'); return; }

  // Read our own first-party localStorage. No third-party-partitioning
  // surprises here because this window is top-level on github.io.
  var raw = null;
  try { raw = localStorage.getItem('veyra_fingerprint'); } catch (_) {}
  if (!raw) { showSignInNeeded(); return; }

  var fp;
  try { fp = JSON.parse(raw); }
  catch (_) { showSignInNeeded(); return; }
  if (!fp || !fp.discordId || !fp.sig || !fp.signedAt) { showSignInNeeded(); return; }

  // JSONP verification against the proxy. Server-side validates the HMAC
  // and cross-checks the member's current tier from the Tiers sheet.
  var cb = '_vcb_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    try { delete window[cb]; } catch (_) { window[cb] = null; }
    if (res && res.ok && res.discordId && res.tier) {
      setHeading('Access verified');
      setBody('<p class="muted">Returning to the game&hellip;</p>');
      reply('ok', { discordId: res.discordId, tier: res.tier });
    } else {
      // Rejected - likely stale session or rotated TOKEN_SECRET. Treat as
      // sign-in-needed from the caller's POV.
      showSignInNeeded();
      try {
        window.opener && window.opener.postMessage(
          { type: 'veyra-verify', nonce: nonce, status: 'null-session' },
          targetOrigin
        );
      } catch (_) {}
    }
  };
  var url = PROXY_URL + '?api=verify-fingerprint' +
            '&discordId=' + encodeURIComponent(fp.discordId) +
            '&sig='       + encodeURIComponent(fp.sig) +
            '&signedAt='  + encodeURIComponent(fp.signedAt) +
            '&callback='  + encodeURIComponent(cb);
  var s = document.createElement('script');
  s.src = url;
  s.onerror = function() {
    try { delete window[cb]; } catch (_) { window[cb] = null; }
    reply('null-session');
  };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
